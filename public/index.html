<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Luma.to Sender - Advanced Email Platform</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <div class="app-container">
    <!-- Header -->
    <header class="app-header">
      <div class="header-content">
        <div class="logo">
          <i class="fas fa-paper-plane"></i>
          <h1>Luma <span>Sender</span></h1>
        </div>
        <div class="header-actions">
          <div id="connectionStatus" class="connection-status">
            <span class="status-dot"></span>
            <span class="status-text">Disconnected</span>
          </div>
          <button id="themeToggle" class="btn btn-icon"><i class="fas fa-moon"></i></button>
        </div>
      </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
      <div class="grid-layout">
        <!-- Server Setup -->
        <div class="panel">
          <div class="panel-header"><i class="fas fa-server"></i><h2>Server Setup</h2></div>
          <div class="panel-body">
            <div class="form-row">
              <div class="form-group"><label>SMTP Host</label><input type="text" id="smtpHost" placeholder="smtp.example.com"></div>
              <div class="form-group"><label>Port</label><input type="text" id="smtpPort" value="465"></div>
            </div>
            <div class="form-row">
              <div class="form-group"><label>Username</label><input type="text" id="smtpUser" placeholder="user@example.com"></div>
              <div class="form-group"><label>Password</label><input type="password" id="smtpPass" placeholder="••••••••"></div>
            </div>
            <div class="form-group">
              <label>Security</label>
              <div class="radio-group">
                <label class="radio-label"><input type="radio" name="security" value="SSL" checked><span class="radio-custom"></span> SSL</label>
                <label class="radio-label"><input type="radio" name="security" value="TLS"><span class="radio-custom"></span> TLS</label>
                <label class="radio-label"><input type="radio" name="security" value="None"><span class="radio-custom"></span> None</label>
              </div>
            </div>
            <div class="form-group">
              <label class="checkbox-label"><input type="checkbox" id="useBcc"><span class="checkmark"></span> Use BCC Mode</label>
            </div>
            <button class="btn btn-primary btn-block" onclick="addSMTP()"><i class="fas fa-plus"></i> Add SMTP Server</button>
          </div>
        </div>

        <!-- SMTP List -->
        <div class="panel">
          <div class="panel-header"><i class="fas fa-list"></i><h2>SMTP List</h2>
            <button class="btn btn-sm btn-icon" onclick="clearSMTPList()"><i class="fas fa-trash"></i></button>
          </div>
          <div class="panel-body">
            <textarea id="smtpList" class="code-editor" readonly placeholder="Added SMTP servers will appear here..."></textarea>
            <div id="smtpCount" class="smtp-count">0 servers configured</div>
          </div>
        </div>

        <!-- Advanced Settings -->
        <div class="panel">
          <div class="panel-header"><i class="fas fa-cogs"></i><h2>Advanced Settings</h2></div>
          <div class="panel-body">
            <div class="form-row">
              <div class="form-group"><label>Change SMTP Every</label><div class="input-with-suffix"><input type="number" id="changeSmtpEvery" value="10"><span class="suffix">emails</span></div></div>
              <div class="form-group"><label>Reconnect After</label><div class="input-with-suffix"><input type="number" id="reconnectAfter" value="0"><span class="suffix">emails</span></div></div>
            </div>
            <div class="form-row">
              <div class="form-group"><label>Pause Duration</label><div class="input-with-suffix"><input type="number" id="pauseSeconds" value="0"><span class="suffix">seconds</span></div></div>
              <div class="form-group"><label>Pause Every</label><div class="input-with-suffix"><input type="number" id="pauseEvery" value="0"><span class="suffix">emails</span></div></div>
            </div>
          </div>
        </div>
      </div>

      <!-- Message Setup -->
      <div class="panel" style="margin-bottom: 1.5rem;">
        <div class="panel-header"><i class="fas fa-envelope"></i><h2>Message Setup</h2></div>
        <div class="panel-body">
          <div class="form-row">
            <div class="form-group"><label>Sender Email</label><input type="email" id="senderEmail" placeholder="you@example.com"></div>
            <div class="form-group"><label>Sender Name</label><input type="text" id="senderName" placeholder="Your Name"></div>
          </div>
          <div class="form-row">
            <div class="form-group"><label>Reply-To</label><input type="email" id="replyTo" placeholder="reply@example.com"></div>
            <div class="form-group">
              <label>Priority</label>
              <select id="priority"><option value="normal">Normal</option><option value="high">High</option><option value="low">Low</option></select>
            </div>
          </div>
          <div class="form-group"><label>Subject</label><input type="text" id="subject" placeholder="Enter email subject"></div>

          <!-- HTML Template Selector -->
          <div class="form-group">
            <label>HTML Template</label>
            <select id="templateSelect">
              <option value="">-- Select a Template --</option>
            </select>
          </div>

          <!-- Editor Toolbar -->
          <div class="editor-toolbar">
            <button type="button" id="editorMode" class="btn btn-sm btn-icon" onclick="toggleEditorMode()">HTML</button>
          </div>

          <!-- Split Editor & Live Preview -->
          <div class="form-row" style="align-items: stretch;">
            <div class="form-group" style="margin: 0; display: flex; flex-direction: column;">
              <label>Message Body</label>
              <textarea id="messageBody" class="code-editor message-editor" placeholder="Enter HTML content or select a template..."></textarea>
            </div>
            <div class="form-group" style="margin: 0; display: flex; flex-direction: column;">
              <label>Live Preview</label>
              <iframe id="htmlPreview" class="preview-frame" sandbox="allow-same-origin"></iframe>
            </div>
          </div>

          <div class="form-row" style="margin-top: 1rem;">
            <div class="form-group">
              <label>Encoding</label>
              <select id="encoding"><option value="UTF-8">UTF-8</option><option value="ISO-8859-1">ISO-8859-1</option></select>
            </div>
            <div class="form-group"><label>Attachment</label><input type="file" id="attachment" class="file-input"></div>
          </div>

          <div class="form-group"><label>Recipients (one per line)</label><textarea id="recipients" class="code-editor" placeholder="user1@example.com&#10;user2@example.com"></textarea></div>
          <div id="recipientCount" class="recipient-count">0 recipients</div>
        </div>
      </div>

      <!-- Campaign Progress -->
      <div class="progress-panel">
        <div class="progress-header">
          <h3><i class="fas fa-chart-line"></i> Campaign Progress</h3>
          <div class="progress-stats">
            <div class="stat"><span id="statTotal" class="stat-value">0</span><span class="stat-label">Total</span></div>
            <div class="stat"><span id="statSent" class="stat-value success">0</span><span class="stat-label">Sent</span></div>
            <div class="stat"><span id="statFailed" class="stat-value danger">0</span><span class="stat-label">Failed</span></div>
            <div class="stat"><span id="statProgress" class="stat-value">0%</span><span class="stat-label">Progress</span></div>
          </div>
        </div>
        <div class="progress-bar-container">
          <div class="progress-bar"><div id="progressFill" class="progress-fill"></div></div>
        </div>
        <div class="action-buttons">
          <button id="startBtn" class="btn btn-success btn-lg" onclick="startSending()"><i class="fas fa-play"></i> Start Sending</button>
          <button id="stopBtn" class="btn btn-danger btn-lg" onclick="stopSending()" disabled><i class="fas fa-stop"></i> Stop Sending</button>
        </div>
      </div>

      <!-- Activity Log -->
      <div class="console-panel">
        <div class="console-header">
          <h3><i class="fas fa-terminal"></i> Activity Log</h3>
          <div class="console-actions">
            <button class="btn btn-sm btn-icon" onclick="clearConsole()"><i class="fas fa-broom"></i></button>
            <button class="btn btn-sm btn-icon" onclick="exportLog()"><i class="fas fa-file-export"></i></button>
          </div>
        </div>
        <div id="consoleLog" class="console-body">
          <div class="log-entry info"><span class="log-time">--:--:--</span><span class="log-message">System ready. Configure SMTP servers and start sending.</span></div>
        </div>
      </div>
    </main>

    <!-- Toast Container -->
    <div id="toastContainer" class="toast-container"></div>
  </div>
  <script src="app.js"></script>
</body>
</html>
